<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>标日词汇派对 - 全功能版</title>
    <script src="vocab.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #2c3e50; overflow: hidden; color: white; font-family: 'Hiragino Sans', sans-serif; user-select: none; touch-action: none; }
        #gameCanvas { display: block; background: radial-gradient(circle, #34495e 0%, #2c3e50 100%); cursor: pointer; }
        #main-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* 顶部 UI */
        #header { width: 100%; padding: 10px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: flex-start; }
        #target-box { background: rgba(0,0,0,0.85); padding: 12px 20px; border-radius: 12px; border-left: 6px solid #e74c3c; pointer-events: auto; min-width: 150px; position: relative; }
        #target-word { color: #ff7675; font-size: 32px; font-weight: bold; display: block; }
        #error-hint { color: #ff4757; font-size: 12px; position: absolute; bottom: -20px; left: 10px; display: none; font-weight: bold; }

        /* 右侧 按钮栏 */
        #sidebar { position: absolute; right: 10px; top: 10px; display: flex; flex-direction: column; gap: 8px; pointer-events: auto; text-align: right; }
        .info-panel { background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 8px; font-size: 14px; margin-bottom: 5px; }
        .ui-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; border-radius: 6px; padding: 8px 12px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .ui-btn:hover { background: rgba(255,255,255,0.3); }

        /* 遮罩层 */
        .full-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        .overlay-card { background: white; color: #333; padding: 25px; border-radius: 20px; text-align: center; width: 80%; max-width: 350px; }
        .mode-group { display: flex; gap: 10px; width: 100%; margin: 10px 0; }
        .game-btn { background: #2ed573; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-screen" class="full-overlay">
        <div class="overlay-card">
            <h2 style="margin-top:0;">标日词汇派对</h2>
            <p style="color:#666; font-size:13px;">选择模式与内容开始 (60秒限时)</p>
            <div style="font-weight:bold; margin-bottom:5px;">初级上册：</div>
            <div class="mode-group">
                <button class="game-btn" onclick="prepareGame('upper', 'jtoc')">日→中</button>
                <button class="game-btn" style="background:#3498db;" onclick="prepareGame('upper', 'ctoj')">中→日</button>
            </div>
            <div style="font-weight:bold; margin-bottom:5px;">初级下册：</div>
            <div class="mode-group">
                <button class="game-btn" onclick="prepareGame('lower', 'jtoc')">日→中</button>
                <button class="game-btn" style="background:#3498db;" onclick="prepareGame('lower', 'ctoj')">中→日</button>
            </div>
            <button class="game-btn" style="background:#95a5a6; margin-top:10px;" onclick="toggleRules(true)">📜 游戏规则</button>
        </div>
    </div>

    <div id="rule-screen" class="full-overlay" style="display:none;">
        <div class="overlay-card">
            <h3>游戏规则</h3>
            <div style="text-align: left; font-size: 13px; line-height: 1.6; color:#444;">
                1. <b>连击奖励</b>：连续击中计分翻倍（1→2→3→最高4分）。<br>
                2. <b>惩罚机制</b>：连续点错2次提示，点错3次及以上将<b>暂停下一次计分</b>。<br>
                3. <b>自动换题</b>：如果目标掉出屏幕，会自动刷新题目。<br>
                4. <b>朗读</b>：无论什么模式，均统一朗读日语。
            </div>
            <button class="game-btn" onclick="toggleRules(false)">返回</button>
        </div>
    </div>

    <div id="pause-screen" class="full-overlay" style="display:none;">
        <div class="overlay-card">
            <h2>游戏暂停</h2>
            <button class="game-btn" onclick="togglePause()">继续练习</button>
            <button class="game-btn" style="background:#e74c3c;" onclick="location.reload()">退出到首页</button>
        </div>
    </div>

    <div id="end-screen" class="full-overlay" style="display:none;">
        <div class="overlay-card">
            <h2 style="color:#e74c3c;">时间到！</h2>
            <div style="font-size:24px; margin:20px 0;">得分: <span id="final-score" style="color:#2ed573; font-weight:bold;">0</span></div>
            <button class="game-btn" onclick="location.reload()">再来一局</button>
        </div>
    </div>

    <div id="main-container">
        <div id="header">
            <div id="target-box">
                <span id="target-word">...</span>
                <div id="error-hint">已经2次连错，如果3次连错，暂停计分</div>
            </div>
        </div>
        <div id="sidebar">
            <div class="info-panel">⏱️ 时间: <span id="timer">60</span>s</div>
            <div class="info-panel">🏆 得分: <span id="score">0</span></div>
            <button class="ui-btn" onclick="togglePause()">暂停</button>
            <button class="ui-btn" onclick="location.reload()">退出</button>
            <button class="ui-btn" onclick="toggleRules(true)">规则</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
let activeVocab = [], gameMode = 'jtoc'; 
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const timerEl = document.getElementById('timer');
const targetWordEl = document.getElementById('target-word');
const errorHintEl = document.getElementById('error-hint');

let score = 0, timeLeft = 60, gameActive = false, isPaused = false;
let combo = 0, errorStreak = 0, skipNextScore = false;
let currentTarget = null, fruits = [], particles = [];
let gameInterval;

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function speak(text) {
    if (!gameActive || isPaused) return;
    window.speechSynthesis.cancel();
    const ut = new SpeechSynthesisUtterance(text);
    ut.lang = 'ja-JP';
    ut.rate = 0.8;
    window.speechSynthesis.speak(ut);
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.size = Math.random() * 4 + 2;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 1.0;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life -= 0.03; }
    draw() {
        ctx.save(); ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

class Fruit {
    constructor() { this.init(); }
    init() {
        let newData;
        do { newData = activeVocab[Math.floor(Math.random() * activeVocab.length)]; } 
        while (fruits.some(f => f.wordData.jp === newData.jp));
        this.wordData = newData;
        this.radius = 65;
        this.x = Math.random() * (canvas.width - 130) + 65;
        this.y = canvas.height + 120;
        this.gravity = 0.07;
        const targetH = canvas.height * (0.8 + Math.random() * 0.15);
        this.speedY = -Math.sqrt(2 * this.gravity * targetH);
        this.speedX = (Math.random() - 0.5) * 1.5;
        this.color = `hsl(${Math.random() * 360}, 70%, 55%)`;
    }
    update() {
        if (!gameActive || isPaused) return;
        this.speedY += this.gravity; this.x += this.speedX; this.y += this.speedY;
        if (this.y > canvas.height + 200) this.init();
    }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color; ctx.fill(); ctx.strokeStyle = 'white'; ctx.lineWidth = 3; ctx.stroke();
        ctx.fillStyle = "white"; ctx.textAlign = "center";
        ctx.font = `bold 18px Arial`;
        // 根据模式显示中文或日文
        let displayText = (gameMode === 'jtoc') ? this.wordData.cn : this.wordData.jp;
        ctx.fillText(displayText, 0, 8);
        ctx.restore();
    }
}

function handleInput(e) {
    if (!gameActive || isPaused) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const rect = canvas.getBoundingClientRect();
    const mouseX = clientX - rect.left, mouseY = clientY - rect.top;

    let hitAnything = false;
    fruits.forEach(f => {
        const dx = mouseX - f.x, dy = mouseY - f.y;
        if (Math.sqrt(dx*dx + dy*dy) < f.radius) {
            hitAnything = true;
            if (f.wordData.jp === currentTarget.jp) {
                // 击中正确
                for(let i=0; i<20; i++) particles.push(new Particle(f.x, f.y, f.color));
                
                if (!skipNextScore) {
                    combo = Math.min(combo + 1, 4);
                    score += combo;
                    scoreEl.textContent = score;
                } else {
                    skipNextScore = false; // 恢复计分
                }
                
                errorStreak = 0;
                errorHintEl.style.display = 'none';
                f.init();
                pickNewTarget();
            } else {
                // 点击错误
                processError();
            }
        }
    });
}

function processError() {
    combo = 0;
    errorStreak++;
    if (errorStreak === 2) {
        errorHintEl.style.display = 'block';
    } else if (errorStreak >= 3) {
        skipNextScore = true;
    }
}

function pickNewTarget() {
    if (!gameActive || isPaused || fruits.length === 0) return;
    const randomIndex = Math.floor(Math.random() * fruits.length);
    currentTarget = fruits[randomIndex].wordData;
    // 顶部显示取决于模式：日转中显示日文，中转日显示中文
    targetWordEl.textContent = (gameMode === 'jtoc') ? currentTarget.jp : currentTarget.cn;
    speak(currentTarget.jp);
}

window.prepareGame = function(book, mode) {
    window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
    activeVocab = (book === 'upper') ? vocabUpper : vocabLower;
    gameMode = mode;
    document.getElementById('start-screen').style.display = 'none';
    startGame();
};

function startGame() {
    gameActive = true; score = 0; timeLeft = 60; combo = 0; errorStreak = 0;
    fruits = []; particles = [];
    scoreEl.textContent = "0"; timerEl.textContent = "60";
    
    for (let i = 0; i < 4; i++) {
        setTimeout(() => {
            if(gameActive) {
                const f = new Fruit();
                fruits.push(f);
                if(fruits.length === 4) pickNewTarget();
            }
        }, i * 500);
    }

    gameInterval = setInterval(() => {
        if (!isPaused) {
            timeLeft--;
            timerEl.textContent = timeLeft;
            if (timeLeft <= 0) endGame();
        }
    }, 1000);
    animate();
}

function endGame() {
    gameActive = false;
    clearInterval(gameInterval);
    document.getElementById('end-screen').style.display = 'flex';
    document.getElementById('final-score').textContent = score;
}

function animate() {
    if (!gameActive || isPaused) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 水果更新
    fruits.forEach(f => { f.update(); f.draw(); });

    // 粒子更新
    for(let i=particles.length-1; i>=0; i--) {
        particles[i].update(); particles[i].draw();
        if(particles[i].life <= 0) particles.splice(i, 1);
    }

    // 实时目标检测
    if (currentTarget) {
        const exists = fruits.some(f => f.wordData.jp === currentTarget.jp && f.y < canvas.height + 50);
        if (!exists) { combo = 0; pickNewTarget(); }
    }
    
    requestAnimationFrame(animate);
}

function togglePause() {
    isPaused = !isPaused;
    document.getElementById('pause-screen').style.display = isPaused ? 'flex' : 'none';
    if(!isPaused) animate();
}

function toggleRules(show) {
    document.getElementById('rule-screen').style.display = show ? 'flex' : 'none';
}

canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});
canvas.addEventListener('mousedown', handleInput);
</script>
</body>
</html>

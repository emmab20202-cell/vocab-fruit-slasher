<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>词汇水果派对 - 增强版</title>
    <style>
        body { margin: 0; padding: 0; background-color: #2c3e50; overflow: hidden; color: white; font-family: 'PingFang SC', sans-serif; user-select: none; touch-action: none; -webkit-tap-highlight-color: transparent; }
        #gameCanvas { display: block; background: radial-gradient(circle, #34495e 0%, #2c3e50 100%); cursor: pointer; }
        
        #main-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; z-index: 10; pointer-events: none; }
        
        #header { width: 100%; padding: 10px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: flex-start; }
        
        #target-box { background: rgba(0,0,0,0.8); padding: 10px 15px; border-radius: 10px; border-left: 6px solid #ff9f43; min-width: 140px; max-width: 50%; pointer-events: auto; position: relative; }
        #target-word { color: #ff9f43; font-size: 32px; font-weight: bold; display: block; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); line-height: 1.2; }
        /* 新增：左上角中文提示样式 */
        #target-cn { color: #bdc3c7; font-size: 16px; display: block; margin-top: 2px; }
        
        #combo-toast { position: absolute; bottom: -45px; left: 0; font-size: 24px; font-weight: bold; color: #f1c40f; display: none; white-space: nowrap; animation: pop 0.5s ease-out; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }

        #error-tip { position: absolute; bottom: -25px; left: 0; font-size: 12px; color: #ff4757; font-weight: bold; width: 200%; display: none; }

        #sidebar { position: absolute; right: 10px; top: 10px; display: flex; flex-direction: column; gap: 8px; text-align: right; pointer-events: auto; }
        #info-box { background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 10px; font-size: 14px; min-width: 70px; }

        .sidebar-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer; }
        .sidebar-btn.paused { background: #f1c40f; color: #333; }

        @media (min-width: 768px) {
            #target-word { font-size: 48px; }
            #target-cn { font-size: 22px; }
            #info-box { font-size: 20px; }
            .sidebar-btn { font-size: 16px; padding: 10px 15px; }
        }

        .full-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        .overlay-card { background: white; color: #333; padding: 25px; border-radius: 20px; text-align: center; width: 85%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .game-btn { background: #2ed573; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; margin: 8px; width: 85%; display: inline-block; transition: all 0.2s; text-decoration: none; }
        .game-btn:active { transform: translateY(2px); opacity: 0.9; }

        .rule-list { text-align: left; font-size: 14px; line-height: 1.6; color: #444; margin: 15px 0; }

        #review-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 200; pointer-events: auto; }
        #review-card { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #333; padding: 25px; border-radius: 20px; text-align: center; border: 6px solid #ff9f43; width: 80%; max-width: 400px; }
    </style>
</head>

    <div id="start-screen" class="full-overlay">
        <div class="overlay-card">
            <h2 style="margin-top:0; color:#2c3e50;">词汇水果派对</h2>
            <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
                <button class="game-btn" onclick="startGame('free')">🎮 畅玩模式</button>
                <button class="game-btn" style="background:#ff9f43;" onclick="startGame('review')">📚 复习模式</button>
                <button class="game-btn" style="background:#3498db;" onclick="showRules()">📜 游戏规则</button>
            </div>
        </div>
    </div>

    <div id="rule-screen" class="full-overlay" style="display:none;">
        <div class="overlay-card">
            <h3 style="margin-top:0;">游戏规则</h3>
            <div class="rule-list">
                1. 点击提示的目标单词水果。<br>
                2. <b>连击奖励：</b>击中加分递增（1→2→3→最高4分）。<br>
                3. <b>计分处罚：</b>连错3次将暂停下一次计分。<br>
                4. <b>复习模式：</b>切中后会展示卡片并跟读两次。
            </div>
            <button class="game-btn" style="background:#e74c3c;" onclick="hideRules()">退出</button>
        </div>
    </div>

    <div id="review-overlay">
        <div id="review-card">
            <span id="review-word-en" style="font-size:48px; font-weight:bold; color:#e67e22; display:block;">word</span>
            <span id="review-word-cn" style="font-size:24px; color:#7f8c8d; border-top:1px solid #eee; margin-top:10px; padding-top:10px; display:block;">意思</span>
            <div style="margin:15px 0; font-size:14px; color: #95a5a6;">🔊 请跟我读 Read after me...</div>
            <button class="game-btn" style="background:#34495e; width: 60%; font-size: 14px;" onclick="closeReviewManually()">我已会了，跳过</button>
        </div>
    </div>

    <div id="game-over" class="full-overlay" style="display:none">
        <div class="overlay-card">

            <div style="font-size:18px; margin: 15px 0;">

            </div>
            <button class="game-btn" onclick="location.reload()">回到主页</button>
        </div>
    </div>

    <div id="main-container">
        <div id="header">

            </div>
        </div>
        
        <div id="sidebar">

            <button id="pause-btn" class="sidebar-btn" onclick="togglePause()">暂停</button>

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const targetWordEl = document.getElementById('target-word');
const targetCnEl = document.getElementById('target-cn'); // 获取中文提示元素
const timerEl = document.getElementById('timer');
const scoreEl = document.getElementById('score');
const comboToastEl = document.getElementById('combo-toast');
const errorTipEl = document.getElementById('error-tip');

let score = 0, timeLeft = 60, gameActive = false, isPaused = false, isManuallyPaused = false;
let comboCount = 0, errorStreak = 0, scoreSuspended = false;
let currentTarget = null, fruits = [], particles = [], gameMode = 'free';
let gameCountdownInterval, voiceLoopInterval;
let reviewTimeout = null; // 用于控制复习模式的延时

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

window.showRules = function() { document.getElementById('rule-screen').style.display = 'flex'; };
window.hideRules = function() { document.getElementById('rule-screen').style.display = 'none'; };

function speak(text, callback) {
    if (!gameActive || isManuallyPaused) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US'; utterance.rate = 0.8;
    if(callback) utterance.onend = callback;
    window.speechSynthesis.speak(utterance);
}

// 粒子特效类
class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.size = Math.random() * 5 + 2;
        this.speedX = (Math.random() - 0.5) * 15; this.speedY = (Math.random() - 0.5) * 15;
        this.gravity = 0.2; this.life = 1.0; this.decay = Math.random() * 0.03 + 0.02;
    }
    update() { if(!isPaused && !isManuallyPaused) { this.x += this.speedX; this.y += this.speedY; this.speedY += this.gravity; this.life -= this.decay; } }
    draw() { ctx.fillStyle = this.color; ctx.globalAlpha = this.life; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1.0; }
}

// 水果对象类
class Fruit {
    constructor() { this.init(); }
    init() {
        let newData;
        do { newData = vocabularyData[Math.floor(Math.random() * vocabularyData.length)]; } 
        while (fruits.some(f => f.wordData.en === newData.en));
        this.wordData = newData;
        this.radius = Math.min(canvas.width, canvas.height) * 0.12;
        if(this.radius > 70) this.radius = 70;
        this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
        this.y = canvas.height + 150;
        this.speedX = (Math.random() - 0.5) * 2;
        this.speedY = -(Math.random() * 4 + 11);
        this.gravity = 0.15; this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
    }
    update() {
        if (!gameActive || isPaused || isManuallyPaused) return;
        this.speedY += this.gravity; this.x += this.speedX; this.y += this.speedY;
        if (this.y > canvas.height + 150) {
            if(this.wordData.en === currentTarget?.en) comboCount = 0; 
            this.init();
        }
    }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color; ctx.fill(); ctx.lineWidth = 3; ctx.strokeStyle = 'white'; ctx.stroke();
        ctx.fillStyle = "white"; ctx.font = `bold ${this.radius * 0.35}px Arial`; ctx.textAlign = "center";
        ctx.fillText(this.wordData.en.toLowerCase(), 0, this.radius * 0.12);
        ctx.restore();
    }
}

function handleInput(e) {
    if (!gameActive || isPaused || isManuallyPaused) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const rect = canvas.getBoundingClientRect();
    const mouseX = clientX - rect.left, mouseY = clientY - rect.top;

    let hitCorrect = false;
    let hitAnyFruit = false;

    fruits.forEach(fruit => {
        const dx = mouseX - fruit.x, dy = mouseY - fruit.y;
        if (Math.sqrt(dx*dx + dy*dy) < fruit.radius) {
            hitAnyFruit = true;
            if (fruit.wordData.en === (currentTarget ? currentTarget.en : "")) {
                hitCorrect = true;
                processCorrectHit(fruit);
                fruit.init();
            }
        }
    });
    if (hitAnyFruit && !hitCorrect) processWrongHit();
}

function processCorrectHit(fruit) {
    for (let i = 0; i < 20; i++) particles.push(new Particle(fruit.x, fruit.y, fruit.color));
    errorStreak = 0; 
    errorTipEl.style.display = 'none';

    if (scoreSuspended) {
        scoreSuspended = false;
        comboCount = 0;
    } else {
        comboCount++;
        score += Math.min(comboCount, 4);
        if(comboCount >= 2) {
            comboToastEl.textContent = `棒！${comboCount}连击！`;
            comboToastEl.style.display = 'block';
            setTimeout(() => { comboToastEl.style.display = 'none'; }, 800);
        }
    }
    scoreEl.textContent = score;
    if (gameMode === 'review') startReviewSession();
    else speak(currentTarget.en, () => { if(gameActive) pickNewTarget(); });
}

function processWrongHit() {
    comboCount = 0;
    errorStreak++;
    if (errorStreak === 2) errorTipEl.style.display = 'block';
    else if (errorStreak >= 3) scoreSuspended = true;
}

// 修改后的复习模式逻辑
function startReviewSession() {
    isPaused = true;
    document.getElementById('review-overlay').style.display = 'block';
    document.getElementById('review-word-en').textContent = currentTarget.en.toLowerCase();
    document.getElementById('review-word-cn').textContent = currentTarget.cn;
    
    // 第一遍朗读
    speak(currentTarget.en, () => {
        reviewTimeout = setTimeout(() => {
            // 第二遍朗读
            speak(currentTarget.en, () => {
                reviewTimeout = setTimeout(() => {
                    closeReviewManually();
                }, 800);
            });
        }, 600);
    });
}

// 新增：手动/自动关闭复习卡片并继续游戏
window.closeReviewManually = function() {
    window.speechSynthesis.cancel();
    if(reviewTimeout) clearTimeout(reviewTimeout);
    document.getElementById('review-overlay').style.display = 'none';
    isPaused = false;
    if(gameActive) pickNewTarget();
};

function pickNewTarget() {
    if (!gameActive || isPaused || isManuallyPaused) return;
    const randomIndex = Math.floor(Math.random() * fruits.length);
    currentTarget = fruits[randomIndex].wordData;
    targetWordEl.textContent = currentTarget.en.toLowerCase();
    // 修改点：同时更新中文显示
    targetCnEl.textContent = currentTarget.cn;
    speak(currentTarget.en);
}

window.togglePause = function() {
    if (!gameActive || isPaused) return;
    isManuallyPaused = !isManuallyPaused;
    const btn = document.getElementById('pause-btn');
    if (isManuallyPaused) {
        btn.textContent = "继续"; btn.classList.add('paused');
        window.speechSynthesis.cancel();
    } else {
        btn.textContent = "暂停"; btn.classList.remove('paused');
        if(currentTarget) speak(currentTarget.en);
    }
};

window.startGame = function(mode) {
    gameMode = mode;
    score = 0; timeLeft = 60; fruits = []; particles = []; comboCount = 0; errorStreak = 0; scoreSuspended = false;
    scoreEl.textContent = "0";
    timerEl.textContent = "60";
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-over').style.display = 'none';
    gameActive = true;
    
    for (let i = 0; i < 4; i++) {
        setTimeout(() => { if (gameActive) { fruits.push(new Fruit()); if (fruits.length === 1) pickNewTarget(); } }, i * 600);
    }
    
    if(gameCountdownInterval) clearInterval(gameCountdownInterval);
    gameCountdownInterval = setInterval(() => {
        if (gameActive && !isPaused && !isManuallyPaused) {
            timeLeft--; timerEl.textContent = timeLeft;
            if (timeLeft <= 0) endGame();
        }
    }, 1000);

    if(voiceLoopInterval) clearInterval(voiceLoopInterval);
    voiceLoopInterval = setInterval(() => {
        if (gameActive && !isPaused && !isManuallyPaused && currentTarget) speak(currentTarget.en);
    }, 4500);
    
    animate();
};

function endGame() {
    gameActive = false;
    window.speechSynthesis.cancel();
    clearInterval(gameCountdownInterval);
    clearInterval(voiceLoopInterval);
    
    let highScore = localStorage.getItem('fruitGameHighScore') || 0;
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('fruitGameHighScore', score);
    }
    
    document.getElementById('game-over').style.display = 'flex';
    document.getElementById('final-score').textContent = score;
    document.getElementById('high-score').textContent = highScore;
}

canvas.addEventListener('mousedown', handleInput);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, { passive: false });

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (gameActive && fruits.length > 0 && !isPaused && !isManuallyPaused && currentTarget) {
        if (!fruits.some(f => f.wordData.en === currentTarget.en)) pickNewTarget();
    }
    fruits.forEach(f => { f.update(); f.draw(); });
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(); particles[i].draw();
        if (particles[i].life <= 0) particles.splice(i, 1);
    }
    if (gameActive) requestAnimationFrame(animate);
}
</script>

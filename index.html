<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>词汇游戏大厅</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 { color: #333; margin-bottom: 30px; }
        .game-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .game-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            width: 250px;
            text-align: center;
            transition: transform 0.2s;
            text-decoration: none;
            color: inherit;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }
        .game-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        .game-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #007bff;
        }
        .game-desc {
            font-size: 0.9rem;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>🎮 词汇小游戏集合</h1>

    <div class="game-container">
        <a href="./english/index.html" class="game-card">
            <div class="game-icon">🔤</div>
            <div class="game-title">英语单词派对</div>
            <div class="game-desc">通过趣味游戏练习你的英语词汇量！</div>
        </a>

        <a href="./japanese/index.html" class="game-card">
            <div class="game-icon">🚀</div>
            <div class="game-title">日语单词派对</div>
            <div class="game-desc">《标准日本语》上册词汇派对</div>
        </a>
    </div>

    <p style="margin-top: 50px; color: #999; font-size: 0.8rem;">部署于 GitHub Pages</p>

</body>
</html>
